name: Release Please

# Single release path. On every push to main, release-please maintains a
# "Release PR" that bumps the version and CHANGELOG from conventional commits.
# When that PR merges, a release is created and the release-please job builds,
# checksums, and uploads the extension artifacts to it. Packaging lives here
# rather than in a separate tag-triggered workflow because tags pushed by
# GITHUB_TOKEN do not trigger other workflows.
#
# AMO submission is a separate job gated behind the "amo" environment (requires
# manual approval in the Actions UI) so a failed/slow AMO submission can never
# strand the GitHub release without its build assets, and so a human always
# signs off before anything is pushed to Mozilla's review queue.

on:
    push:
        branches:
            - main

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: release-please-main
    cancel-in-progress: false

jobs:
    release-please:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            tag_name: ${{ steps.release.outputs.tag_name }}
        env:
            VITE_COMMUNITY_API_ORIGIN: ${{ vars.VITE_COMMUNITY_API_ORIGIN }}
        steps:
            - name: Run release-please
              id: release
              uses: googleapis/release-please-action@v4
              with:
                  token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
                  config-file: release-please-config.json
                  manifest-file: .release-please-manifest.json

            - name: Checkout
              if: ${{ steps.release.outputs.release_created }}
              uses: actions/checkout@v4
              with:
                  ref: ${{ steps.release.outputs.tag_name }}

            - name: Version/tag check
              if: ${{ steps.release.outputs.release_created }}
              shell: bash
              run: |
                  PKG_VERSION=$(node -p "require('./apps/extension/package.json').version")
                  ROOT_VERSION=$(node -p "require('./package.json').version")
                  TAG="${{ steps.release.outputs.tag_name }}"
                  STRIPPED="${TAG#v}"
                  if [ "$PKG_VERSION" != "$STRIPPED" ]; then
                    echo "::error::Version mismatch: apps/extension/package.json=$PKG_VERSION tag=$TAG"
                    exit 1
                  fi
                  if [ "$ROOT_VERSION" != "$STRIPPED" ]; then
                    echo "::error::Version mismatch: package.json=$ROOT_VERSION tag=$TAG - bump root package.json too"
                    exit 1
                  fi
                  echo "Version check passed: $PKG_VERSION"

            - name: Setup Node.js
              if: ${{ steps.release.outputs.release_created }}
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Use npm 11
              if: ${{ steps.release.outputs.release_created }}
              run: npm install -g npm@11

            - name: Install
              if: ${{ steps.release.outputs.release_created }}
              run: npm install

            - name: Validate
              if: ${{ steps.release.outputs.release_created }}
              run: npm run check

            - name: Package Chromium
              if: ${{ steps.release.outputs.release_created }}
              run: npm run zip

            - name: Package Firefox
              if: ${{ steps.release.outputs.release_created }}
              run: npm run zip:firefox

            - name: Manifest smoke gate
              if: ${{ steps.release.outputs.release_created }}
              run: npm run test:manifest --workspace @amr/browser-tests

            - name: Generate checksums
              if: ${{ steps.release.outputs.release_created }}
              shell: bash
              run: |
                  cd apps/extension/.output
                  sha256sum *.zip > SHA256SUMS.txt

            - name: Upload release assets
              if: ${{ steps.release.outputs.release_created }}
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG: ${{ steps.release.outputs.tag_name }}
              run: |
                  files=(apps/extension/.output/*.zip apps/extension/.output/SHA256SUMS.txt)
                  gh release upload "$TAG" "${files[@]}" --clobber

            - name: Upload Firefox build for AMO submission
              if: ${{ steps.release.outputs.release_created }}
              uses: actions/upload-artifact@v4
              with:
                  name: firefox-dist
                  path: apps/extension/.output/firefox-mv3
                  retention-days: 7

    amo-submit:
        needs: release-please
        if: ${{ needs.release-please.outputs.release_created }}
        runs-on: ubuntu-latest
        timeout-minutes: 15
        environment: amo
        steps:
            - name: Download Firefox build
              uses: actions/download-artifact@v4
              with:
                  name: firefox-dist
                  path: firefox-mv3

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Sign Firefox add-on (AMO)
              env:
                  AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
                  AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
              run: |
                  npx --yes web-ext sign \
                    --channel=listed \
                    --approval-timeout=0 \
                    --api-key="$AMO_JWT_ISSUER" \
                    --api-secret="$AMO_JWT_SECRET" \
                    --source-dir=firefox-mv3 \
                    --artifacts-dir=amo-artifacts

            - name: Attach signed xpi to the release
              if: always()
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG: ${{ needs.release-please.outputs.tag_name }}
              run: |
                  if compgen -G "amo-artifacts/*.xpi" > /dev/null; then
                    gh release upload "$TAG" amo-artifacts/*.xpi --clobber
                  else
                    echo "No signed xpi produced - AMO submission likely failed or is pending review."
                  fi
